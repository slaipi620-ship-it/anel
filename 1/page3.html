<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <button class="next-btn" onclick="window.location.href='page4.html'">
    Дальше 😃
</button>
    <style>
        body{
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    background: linear-gradient(
        90deg,
        #667eea 0%,
        #764ba2 100%
    );

    font-family: Arial, sans-serif;
    overflow: hidden;
}
    </style>

    <div style="text-align:center;">
  <video width="500" height="800" controls>
    <source src="vajno.mp4" type="video/mp4">
  </video>
</div>
    <script>
function createHeart() {
    const heart = document.createElement("div");

    const emojis = ["💖","💗","🎀","💫","✨","⭐","🌸","💭"];

    heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

    heart.style.position = "fixed";

    // Только по бокам
    if (Math.random() < 0.5) {
        heart.style.left = (Math.random() * 15) + "vw";
    } else {
        heart.style.left = (85 + Math.random() * 15) + "vw";
    }

    heart.style.bottom = "-50px";
    heart.style.fontSize = (18 + Math.random() * 20) + "px";
    heart.style.pointerEvents = "none";
    heart.style.zIndex = "1";

    document.body.appendChild(heart);

    let pos = -50;

    const animation = setInterval(() => {
        pos += 2;
        heart.style.bottom = pos + "px";

        if (pos > window.innerHeight + 100) {
            clearInterval(animation);
            heart.remove();
        }
    }, 16);
}

setInterval(createHeart, 120);
</script>
</body>
</html>
