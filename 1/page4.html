<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Игра вопросов</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

h1 {
    color: white;
    font-size: 22px;
    margin-bottom: 15px;
}

input {
    width: 250px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: white;
    font-weight: bold;
}

#btns {
    display: none;
    position: relative;
    height: 120px;
}

#noBtn {
    position: absolute;
    left: 50px;
    top: 40px;
    transition: 0.2s;
}
</style>
</head>

<body>

<div class="container">
    <h1 id="title">Почему ты любишь потрепать мне нервы?</h1>

    <input id="inputBox" type="text" placeholder="Напиши ответ..." />
    <br>

    <button id="mainBtn" onclick="send()">Отправить</button>

    <div id="btns">
        <button onclick="yes()">Да</button>
        <button id="noBtn" onclick="runAway()">Нет</button>
    </div>
</div>

<script>
let step = 0;

/* Telegram (можешь вставить свои данные) */
const BOT_TOKEN = "8867806119:AAFaYaQ3ACbFTBANbZuaqPCxqTB3OPot2xI";
const CHAT_ID = "5372569828";

function sendToTelegram(text) {
    if (!BOT_TOKEN || BOT_TOKEN === "YOUR_BOT_TOKEN") return;

    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text
        })
    });
}

/* шаги */
function send() {
    const title = document.getElementById("title");
    const input = document.getElementById("inputBox");

    const value = input.value.trim();

    if (value) {
        sendToTelegram(`Шаг ${step + 1}: ${value}`);
    }

    step++;

    if (step === 1) {
        title.innerText = "Какой твой любимый роман?";
    }

    else if (step === 2) {
        title.innerText = "Почему именно этот роман?";
    }

    else if (step === 3) {
        title.innerText = "Как тебе этот сайт?";
    }

    else if (step === 4) {
        title.innerText = "Ты красивая?";

        input.style.display = "none";
        document.getElementById("mainBtn").style.display = "none";
        document.getElementById("btns").style.display = "block";
    }

    input.value = "";
}

/* ДА */
function yes() {
    document.getElementById("title").innerText = "Я знал";
    sendToTelegram("Ответ: ДА");
    document.getElementById("btns").style.display = "none";
}

/* НЕТ убегает */
function runAway() {
    const btn = document.getElementById("noBtn");
    const box = document.getElementById("btns");

    const x = Math.random() * (box.clientWidth - 80);
    const y = Math.random() * (box.clientHeight - 50);

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}
</script>
<script>
function createHeart() {
    const heart = document.createElement("div");

    const emojis = ["💖","💗","🎀","💫","✨","⭐","🌸","💭"];

    heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

    heart.style.position = "fixed";

    // Только по бокам
    if (Math.random() < 0.5) {
        heart.style.left = (Math.random() * 15) + "vw";
    } else {
        heart.style.left = (85 + Math.random() * 15) + "vw";
    }

    heart.style.bottom = "-50px";
    heart.style.fontSize = (18 + Math.random() * 20) + "px";
    heart.style.pointerEvents = "none";
    heart.style.zIndex = "1";

    document.body.appendChild(heart);

    let pos = -50;

    const animation = setInterval(() => {
        pos += 2;
        heart.style.bottom = pos + "px";

        if (pos > window.innerHeight + 100) {
            clearInterval(animation);
            heart.remove();
        }
    }, 16);
}

setInterval(createHeart, 120);
</script>
</body>
</html>
