<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для Анель ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

h1{
    color:white;
    text-align:center;
    margin-bottom:30px;
}

.buttons{
    display:flex;
    gap:15px;
}

button{
    padding:12px 28px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#yesBtn{
    background:#4CAF50;
    color:white;
}

#noBtn{
    background:#ff4d6d;
    color:white;
    position:relative;
    transition:transform 0.5s ease-in-out;
}
</style>
</head>
<body>

<h1 id="text">Ты точно Анель? 🧐</h1>

<div class="buttons">
    <button id="yesBtn">Да 😄</button>
    <button id="noBtn">Нет 😅</button>
</div>

<script>
const text = document.getElementById("text");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let stage = 0;

/*
stage 0:
Ты точно Анель?

stage 1:
Попробуй нажать Нет

stage 2:
Да шучу я, можешь нажать Да
*/

// Кнопка ДА
yesBtn.addEventListener("click", () => {

    if(stage === 0){
        text.innerText = "Попробуй нажать Нет 😏";
        stage = 1;
        return;
    }

    // Переход на третью страницу
    window.location.href = "page3.html";
});

// Кнопка НЕТ
noBtn.addEventListener("click", () => {

    // Пока не нажали ДА первый раз — ничего
    if(stage === 0) return;

    // Первый клик по НЕТ
    if(stage === 1){
        text.innerText = "Да шучу я, можешь нажать Да 😆";
        stage = 2;
    }

    // Плавное убегание
    const x = Math.random() * 180 - 90;
    const y = Math.random() * 120 - 60;

    noBtn.style.transform = `translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>
