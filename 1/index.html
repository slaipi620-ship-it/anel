<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Секретный вход</title>
<meta name="viewport" content="width=1200">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    width:350px;
}

h1{
    margin-bottom:15px;
    color:#333;
}

p{
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    margin-bottom:15px;
}

input:focus{
    outline:none;
    border-color:#667eea;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

#error{
    color:red;
    margin-top:10px;
}


</style>
</head>

<body>

<div class="card">
    <h1>🔒 Секретный вход</h1>
    <p>Введите своё имя</p>

    <input type="text" id="name" placeholder="Ваше имя">
    <button onclick="checkName()">Войти</button>

    <div id="error"></div>
</div>

<script>
function createHeart() {
    const heart = document.createElement("div");

    const emojis = ["💖","💗","🎀","💫","✨","⭐","🌸","💭"];

    heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

    heart.style.position = "fixed";

    // Только по бокам
    if (Math.random() < 0.5) {
        heart.style.left = (Math.random() * 15) + "vw";
    } else {
        heart.style.left = (85 + Math.random() * 15) + "vw";
    }

    heart.style.bottom = "-50px";
    heart.style.fontSize = (18 + Math.random() * 20) + "px";
    heart.style.pointerEvents = "none";
    heart.style.zIndex = "1";

    document.body.appendChild(heart);

    let pos = -50;

    const animation = setInterval(() => {
        pos += 2;
        heart.style.bottom = pos + "px";

        if (pos > window.innerHeight + 100) {
            clearInterval(animation);
            heart.remove();
        }
    }, 16);
}

setInterval(createHeart, 120);
</script>

<script>
function checkName(){
    let name = document.getElementById("name").value.trim();

    if(name === "Анель" || name === "анель"){
        location.href = "page2.html";
    } else {
        document.getElementById("error").innerText =
        "❌ Доступ только для Анель";
    }
}
</script>

</body>
</html>
